name: ML Pipeline

on:
  push:
    branches: [ main ]

jobs:

  train-model:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install DVC
      run: |
        pip install dvc

    - name: Run training pipeline
      run: |
        dvc repro

    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: models/

  build-docker:

    needs: train-model
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t privacy-ml-api .

  deploy:

    needs: build-docker
    runs-on: ubuntu-latest

    steps:

    - name: Deploy stack
      run: |
        docker compose up -d